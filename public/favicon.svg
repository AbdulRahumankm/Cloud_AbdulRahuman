<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Terminal Chevron -->
  <path d="M6 10L12 16L6 22" stroke="#10b981" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
  
  <!-- Data Pipeline / Connection Path -->
  <path d="M14 16H20" stroke="#10b981" stroke-width="2" stroke-dasharray="2 2" opacity="0.6" />
  
  <!-- Nodes / Data Points -->
  <circle cx="21" cy="16" r="3" fill="#10b981">
    <animate attributeName="opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite" />
  </circle>
  
  <path d="M24 16H28" stroke="#10b981" stroke-width="2" stroke-dasharray="1 2" opacity="0.4" />
  
  <!-- Terminal Underscore / Node -->
  <rect x="14" y="21" width="6" height="2" fill="#3b82f6" rx="1">
    <animate attributeName="opacity" values="1;0;1" dur="1.2s" repeatCount="indefinite" />
  </rect>
  
  <!-- Background subtle glow (optional, but keep it clean for favicon) -->
  <circle cx="16" cy="16" r="14" stroke="#10b981" stroke-opacity="0.1" stroke-width="0.5" />
</svg>
